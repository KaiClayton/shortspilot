{% extends 'base.html' %}
{% block content %}
<style>
.auth-wrap { max-width: 420px; margin: 80px auto; padding: 0 24px; }
.auth-box { background: #111; border: 1px solid #222; border-radius: 16px; padding: 36px; }
.auth-box h2 { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 8px; }
.auth-box p { color: #666; font-size: 14px; margin-bottom: 28px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 13px; color: #888; margin-bottom: 6px; }
.field input { width: 100%; padding: 10px 14px; background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 8px; color: #e8e8e8; font-size: 14px; }
.field input:focus { outline: none; border-color: #1D9E75; }
.auth-box .btn { width: 100%; text-align: center; padding: 12px; margin-top: 8px; }
.auth-link { text-align: center; margin-top: 16px; font-size: 13px; color: #666; }
.auth-link a { color: #1D9E75; text-decoration: none; }
</style>
<div class="auth-wrap">
  <div class="auth-box">
    <h2>Welcome back</h2>
    <p>Login to your ShortsPilot account</p>
    <form method="POST">
      <div class="field"><label>Email</label><input type="email" name="email" required></div>
      <div class="field"><label>Password</label><input type="password" name="password" required></div>
      <button type="submit" class="btn btn-primary">Login</button>
    </form>
    <div class="auth-link">No account? <a href="/signup">Sign up free</a></div>
  </div>
</div>
{% endblock %}
