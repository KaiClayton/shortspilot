{% extends 'base.html' %}
{% block content %}
<style>
.form-wrap { max-width: 560px; margin: 60px auto; padding: 0 24px; }
.form-box { background: #111; border: 1px solid #222; border-radius: 16px; padding: 36px; }
.form-box h2 { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 8px; }
.form-box p { color: #666; font-size: 14px; margin-bottom: 28px; line-height: 1.5; }
.field { margin-bottom: 20px; }
.field label { display: block; font-size: 13px; color: #888; margin-bottom: 6px; }
.field input { width: 100%; padding: 10px 14px; background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 8px; color: #e8e8e8; font-size: 14px; }
.field input:focus { outline: none; border-color: #1D9E75; }
.field small { display: block; margin-top: 5px; color: #555; font-size: 12px; }
.form-box .btn { width: 100%; text-align: center; padding: 12px; }
</style>
<div class="form-wrap">
  <div class="form-box">
    <h2>Add a YouTube channel</h2>
    <p>Paste the channel URL and we'll download all their Shorts, rank them by views, and schedule them for auto-posting.</p>
    <form method="POST">
      <div class="field">
        <label>Channel name</label>
        <input type="text" name="name" required placeholder="e.g. FinanceCharm">
        <small>Just a label for you to identify it</small>
      </div>
      <div class="field">
        <label>Channel URL</label>
        <input type="text" name="url" required placeholder="https://www.youtube.com/@ChannelName">
        <small>The full YouTube channel URL</small>
      </div>
      <button type="submit" class="btn btn-primary">Add channel & start downloading</button>
    </form>
  </div>
</div>
{% endblock %}
